# ============================================================================
# Workflow 2 — TFTEST / pytest (Pull Request)
#
# Triggered when a PR targets `main` and touches .tf, .tfvars, or test files.
# Runs `pytest tests/` using the terraform-python-testing-helper (tftest)
# library against the module's lightweight plan tests and posts the full
# output as a collapsible PR comment.
#
# Test types executed:
#   - Lightweight (plan-based): validates Terraform plan output without
#     deploying any real infrastructure. Suitable for cost-sensitive resources.
#
# Authentication strategy
# ────────────────────────
# Azure OIDC is used so the azurerm provider can authenticate during
# `terraform plan` (called internally by tftest fixtures).
# A GitHub App token is used so `terraform init` inside the examples/
# directory can pull this private module from GitHub.
#
# Required GitHub Secrets:
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#   GH_APP_ID, GH_APP_PRIVATE_KEY
# ============================================================================

name: "2 · TFTEST (PR)"

on:
  pull_request:
    branches:
      - main
    paths:
      - "**.tf"
      - "**.tfvars"
      - "tests/**"
  workflow_dispatch:

permissions:
  id-token: write      # issue OIDC token for azure/login and azurerm provider
  contents: read
  pull-requests: write # post test results as PR comment

jobs:
  tftest:
    name: pytest / tftest
    runs-on: ubuntu-latest

    env:
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:        "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Python + pytest/tftest setup ─────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r tests/requirements.txt

      # ── Terraform setup ──────────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"
          terraform_wrapper: false  # disabled so raw exit codes are captured

      # ── Azure CLI login via OIDC ──────────────────────────────────────────
      # Required for the azurerm provider during `terraform plan` calls
      # made internally by tftest fixtures.
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Private module access via GitHub App token ────────────────────────
      # tftest calls `terraform init` inside examples/basic/ which pulls
      # this module from the private Terraform-Modules-Internal GitHub org.
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3.1.1
        with:
          client-id:   ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner:       Terraform-Modules-Internal

      - name: Configure Git credentials
        run: |
          git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      # ── Run pytest / tftest ───────────────────────────────────────────────
      # Files in tests/ must match test_*.py or *_test.py for auto-discovery.
      # Files within a single file run in parallel; files run sequentially.
      # timeout-minutes guards against hung provider calls.
      # continue-on-error allows the comment step to post even on failure.
      - name: Run pytest / tftest
        id: test
        timeout-minutes: 30
        run: |
          set +e
          pytest tests/ -v --no-header --tb=short 2>&1 | tee "${{ github.workspace }}/test_output.txt"
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          set -e
        continue-on-error: true

      # ── Post results as PR comment ────────────────────────────────────────
      # Replaces any previous test comment on this PR so the thread stays tidy.
      - name: Post test results to PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs   = require('fs');
            const path = require('path');

            const testText = fs.readFileSync(
              path.join(process.env.GITHUB_WORKSPACE, 'test_output.txt'), 'utf8'
            );

            const MAX  = 65000;
            const text = testText.length > MAX
              ? testText.substring(0, MAX) + '\n\n… (truncated — see full log)'
              : testText;

            const code     = '${{ steps.test.outputs.exit_code }}';
            const statusOf = { '0': '✅ All tests passed', '1': '❌ Tests failed' };
            const status   = statusOf[code] ?? `Exit ${code}`;

            const body = [
              `## TFTEST (pytest) — ${status}`,
              '',
              '<details><summary>Click to expand test output</summary>',
              '',
              '```',
              text,
              '```',
              '</details>',
              '',
              `> Workflow \`${{ github.workflow }}\` · [Run #${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
            ].join('\n');

            // Remove stale test comments so only the latest is visible.
            const { data: comments } = await github.rest.issues.listComments({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments) {
              if (c.user.type === 'Bot' && c.body.startsWith('## TFTEST (pytest)')) {
                await github.rest.issues.deleteComment({
                  owner:      context.repo.owner,
                  repo:       context.repo.repo,
                  comment_id: c.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if tests failed
        if: steps.test.outputs.exit_code != '0'
        run: |
          echo "::error::pytest/tftest tests failed. Review the output above."
          exit 1
